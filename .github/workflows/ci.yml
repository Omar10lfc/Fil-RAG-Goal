name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: ruff check
        run: ruff check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # mypy + pydantic for the BaseModel type info. Anything else we'd
      # need stubs for is excluded via ignore_missing_imports in pyproject.
      - name: Install mypy
        run: pip install mypy==1.11.2 pydantic==2.7.1
      - name: mypy
        run: mypy

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # CPU-only torch keeps the install ~10x smaller and CI under 5min.
      # sentence-transformers will use this same wheel.
      - name: Install torch (CPU wheel)
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.0
      - name: Install project requirements
        run: pip install -r requirements.txt
      # The pytest suite stubs out heavy imports (groq, sentence_transformers),
      # so it runs in seconds. The one test that loads a 400MB model is gated
      # behind EVAL_FULL=1 — we don't set it here.
      - name: pytest
        env:
          # Provide a syntactically-valid dummy key so qa_engine.rag_pipeline
          # imports cleanly under test (the format check rejects empty strings).
          GROQ_API_KEY: gsk_test_dummy_key_for_ci_runs_only_xxxxxxxx
        run: pytest -q
